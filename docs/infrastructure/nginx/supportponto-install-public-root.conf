# SupportPONTO - Nginx snippet for the autonomous installer when root points to public/
# Expected vhost root example:
#   root /www/wwwroot/ponto.supportsondagens.com.br/public;

# Canonical friendly URL: https://ponto.supportsondagens.com.br/install
location = /install {
    return 302 /install/;
}

location ^~ /install/ {
    index index.php;
    try_files $uri $uri/ /install/index.php?$query_string;
}

# The PHP handler below must match the PHP version/pool configured in aaPanel.
# Keep it consistent with the existing vhost PHP location.
location ~ ^/install/index\.php$ {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param SCRIPT_NAME $fastcgi_script_name;
    fastcgi_pass unix:/tmp/php-cgi-82.sock;
}
