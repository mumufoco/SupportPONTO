# SupportPONTO - Nginx snippet for the autonomous installer when root points to the project root
# Expected vhost root example:
#   root /www/wwwroot/ponto.supportsondagens.com.br;

# Application traffic should normally be routed to /public/index.php, but the installer
# must be reachable directly at /install before vendor/ exists.
location = /install {
    return 302 /install/;
}

location ^~ /install/ {
    index index.php;
    try_files $uri $uri/ /install/index.php?$query_string;
}

# The PHP handler below must match the PHP version/pool configured in aaPanel.
location ~ ^/install/index\.php$ {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param SCRIPT_NAME $fastcgi_script_name;
    fastcgi_pass unix:/tmp/php-cgi-82.sock;
}

# Optional hardening: deny direct access to tools and writable from the web root.
location ^~ /tools/ { deny all; }
location ^~ /writable/ { deny all; }
location ~ /\.(?!well-known) { deny all; }
